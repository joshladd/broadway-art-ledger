name: CI

on:
  push:
    branches: [main]
  pull_request:

# Typecheck, lint, and unit tests — fast and deterministic, no external services.
# The production build is done by Vercel on every push (it has the Sanity env the
# build-time data fetch needs), so it isn't duplicated here.
jobs:
  check:
    runs-on: ubuntu-latest
    # Public, non-secret Sanity config (both are NEXT_PUBLIC_ and ship in the
    # client bundle). sanity/env.ts asserts they're set, so schema extraction
    # during typegen needs them present — the dataset name is all that matters
    # here; typegen is an offline schema + query analysis and hits no network.
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: 6vag9i62
      NEXT_PUBLIC_SANITY_DATASET: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Sanity types must match the queries/schema. Regenerate and fail if the
      # committed sanity.types.ts is stale (a query changed without a typegen run).
      - run: npm run typegen
      - run: git diff --exit-code sanity.types.ts
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
