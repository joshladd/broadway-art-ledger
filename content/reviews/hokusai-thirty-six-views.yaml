title: "Hokusai: Thirty-Six Views"
no: № 007
date: 2026-05-30
section: Prints
venue: Japan Society
hood: Turtle Bay
by: Hana Okafor
dek: The most reproduced image on earth, seen as if for the first time.
image: art-07.jpg
artist: Katsushika Hokusai
artwork: Under the Wave off Kanagawa (The Great Wave)
credit: Katsushika Hokusai, Under the Wave off Kanagawa (The Great Wave),
  1830/33. Public domain, Art Institute of Chicago.
alt: Hokusai woodblock of a great cresting blue wave with white claws of foam
  and Mount Fuji beyond.
body: >-
  You have seen “The Great Wave” on tote bags, phone cases, socks, shower
  curtains, and the inside of your own eyelids, and that ubiquity is precisely
  the problem this show has to solve. How do you actually look at the most
  reproduced image on earth? Japan Society’s answer is disarmingly simple: hang
  it small, hang it in sequence, and let the logo become a print again.


  It works. Restored to its place as one of thirty-six views of Mount Fuji, the
  wave stops being a brand and goes back to being what Hokusai made — a print in
  which the mountain is very nearly the last thing you notice, crouched small
  and calm on the horizon while the sea rears up to swallow three boatloads of
  men. Up close, the color carries the argument. That blue is Prussian blue, a
  shocking new import when Hokusai used it, and he grids it into the water’s
  clawed foam with the precision of a man who has decided that a wave is also a
  pattern. The fishermen bow their heads. Whether they are doomed or merely
  soaked, we are never told.


  Hokusai was around seventy when he cut these blocks, signing himself,
  gloriously, “the old man mad about painting” and promising that if he lived to
  a hundred and ten every dot and line would finally come alive. He didn’t get
  there, but the wave did — it has outlived him, outlived Edo, outlived even its
  own fame, which is the rarest kind of survival an image can manage. This
  modest, rigorous, beautifully sequenced show performs a small miracle: for
  about twenty minutes, it lets you forget you have ever seen it before, and
  meet the thing itself.
