title: "Toulouse-Lautrec: Night Work"
no: № 001
date: 2026-07-11
section: Painting
venue: The Morgan Library & Museum
hood: Murray Hill
by: Coleman Reyes
dek: The green-lit face shoved to the edge is the whole argument.
image: art-01.jpg
artist: Henri de Toulouse-Lautrec
artwork: At the Moulin Rouge
credit: Henri de Toulouse-Lautrec, At the Moulin Rouge, 1892–95. Public domain,
  Art Institute of Chicago.
alt: Nightlife scene at the Moulin Rouge with figures around a table and a
  woman’s green-lit face in the foreground.
body: >-
  Everyone remembers the crowd, but the painting belongs to the woman shoved
  half out of the frame at right, her face lit acid green by unseen footlights.
  She is the reason to make the trip. Lautrec painted Montmartre from the inside
  — he practically lived at the Moulin Rouge — and he refuses to sell it to us
  as spectacle. The dancers are off the clock. The drinkers look bored. The
  artist himself turns up in the back, a top-hatted dwarf beside his towering
  cousin, too honest to leave himself out of the transaction.


  The Morgan’s hang leans into the cropping, and it pays off. What reads at
  first as loose reportage is really composition as ambush. Lautrec cuts the
  bodies at the balustrade so the eye can never quite come to rest; the diagonal
  rail shoves you into the room whether you like it or not; and the whole
  machine is built to deposit you, finally, on that ghoulish, gorgeous, gaslit
  face. It is a green that has no business in a human complexion, and it is the
  truest thing in the picture.


  The wall text wants to talk about absinthe and decadence, the usual Montmartre
  package. Ignore it. What Lautrec understood — before the century turned,
  before the movies, before any of the machinery we now use to sell nightlife
  back to ourselves — is that entertainment is labor, and that the people who
  perform intimacy for money are the most watched and least seen figures in
  modern life. He watched them. He saw them. This small, sharp show lets you do
  the same, and it is the most modern hour you can spend in New York this month,
  assembled from a picture made in a smoke-filled basement a hundred years ago.
