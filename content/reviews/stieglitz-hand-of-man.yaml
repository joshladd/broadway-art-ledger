title: "Stieglitz: The Hand of Man"
no: № 008
date: 2026-05-23
section: Photography
venue: International Center of Photography
hood: Essex Crossing
by: Sam Whitfield
dek: Stieglitz argued photography was art by photographing a train.
image: art-08.jpg
artist: Alfred Stieglitz
artwork: The Hand of Man
credit: Alfred Stieglitz, The Hand of Man, 1902, printed 1920/39. Public domain,
  Art Institute of Chicago.
alt: Atmospheric photograph of a steaming locomotive in a rail yard under a hazy
  sky, in silvery gray tones.
body: >-
  In 1902 the question that mattered was whether a machine could make art, and
  Alfred Stieglitz answered it, with characteristic nerve, by photographing
  another machine. “The Hand of Man” is a locomotive steaming into a rail yard —
  all haze, wet track, and industrial melancholy — and it is also a manifesto in
  a trench coat, an argument for photography’s soul disguised as a moody picture
  of a train.


  The trick is that nothing here is left to the camera alone. Stieglitz printed
  the smoke like charcoal, dodged and burned the sky into genuine weather, and
  pulled the whole scene toward the tonal richness everyone at the time reserved
  for etching and lithography. He wanted to prove that a photographer chooses —
  light, moment, print, meaning — as deliberately as any painter, and he stacked
  the deck to prove it. The title states the thesis out loud: the hand of man is
  everywhere in this image and nowhere in the frame, no human figure in sight,
  only the tracks and smoke and deliberate beauty that a human intelligence
  arranged.


  ICP frames the picture as the opening shot of a war Stieglitz would spend the
  next four decades winning — for the gallery, the magazine, the whole idea that
  a photograph could hang beside a painting and not apologize. Seen now, when
  the argument is so thoroughly settled that we photograph our lunches without a
  flicker of doubt, the irony he engineered still lands, and so does the
  silvery, insistent loveliness of the print itself. He wanted photography taken
  seriously. Standing in front of this small, gray, gorgeous thing, you
  genuinely cannot reconstruct why anyone ever thought otherwise — which is the
  surest sign that he won.
