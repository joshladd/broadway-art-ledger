title: The Painted Curtain
no: № 006
date: 2026-06-06
section: Old Masters
venue: The Leiden Collection
hood: Upper East Side
by: Alina Costa
dek: The blue curtain is the painting; the flowers are the excuse.
image: art-06.jpg
artist: Adriaen van der Spelt
artwork: Trompe-l’Oeil Still Life with a Flower Garland and a Curtain
credit: Adriaen van der Spelt, Trompe-l’Oeil Still Life with a Flower Garland
  and a Curtain, 1658. Public domain, Art Institute of Chicago.
alt: Trompe-l’oeil still life of a flower garland behind a blue silk curtain
  drawn half across the panel.
body: >-
  Van der Spelt paints a garland of flowers, ripe and Dutch and slightly
  overblown, and then he paints a blue silk curtain drawn halfway across it — a
  curtain that is, of course, also paint. Your hand twitches. You want to pull
  the cloth aside to see the bouquet it is hiding, and for a half-second, before
  the mind catches up with the eye, you believe you could.


  The gag is ancient. Pliny tells it about Zeuxis and Parrhasius: one painter
  fools the birds with painted grapes, the other fools the painter himself with
  a painted curtain, and the painter concedes the match. Van der Spelt knows the
  story cold and executes it with a straight face and genuinely unnerving skill
  — the silk has weight, the thread catches the light, the whole illusion is
  pitched at exactly the register where admiration curdles into unease. This is
  a 1658 painting about the act of looking, made by a man entirely in control of
  yours.


  The Leiden Collection’s tight little survey of Dutch trompe-l’oeil makes a
  sly, persuasive case that illusionism was the seventeenth century’s conceptual
  art: paintings about painting, wearing the modest costume of mere décor to
  sneak the idea past the patron. The flowers are gorgeous and completely beside
  the point. The real subject is your own eye, caught red-handed in the act of
  believing something it knows to be false — which is, when you think about it,
  the subject of every painting, most of which are too polite to admit it. Four
  hundred years on, the trick still lands. Whether that leaves you humbled or
  laughing is between you and the curtain.
