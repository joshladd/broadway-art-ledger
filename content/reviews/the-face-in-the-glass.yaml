title: The Face in the Glass
no: № 003
date: 2026-06-27
section: Portraiture
venue: Brooklyn Museum
hood: Prospect Heights
by: Marcus Bell
dek: Thirty self-portraits in two years; this is the one that stops lying.
image: art-03.jpg
artist: Vincent van Gogh
artwork: Self-Portrait
credit: Vincent van Gogh, Self-Portrait, 1887. Public domain, Art Institute of Chicago.
alt: Van Gogh self-portrait with red beard against a swirling blue-green
  background of short brushstrokes.
body: >-
  Van Gogh painted himself compulsively — more than thirty times in two years —
  for the least romantic of reasons: models cost money and a mirror is free.
  Keep that in mind at the Brooklyn Museum, where the 1887 head hangs among four
  centuries of people arranging their own faces for posterity. It cuts through
  the room like a slap.


  What is happening here is the moment the borrowed becomes his own. Van Gogh
  had arrived in Paris and swallowed Impressionism whole; you can see the
  flickering, divided brushwork he lifted from the younger painters, the little
  commas of color. But where they used the technique to dissolve a haystack into
  light, he turns it into weather. The blue-green background churns like a sky
  about to do something violent, and the face — ginger-bearded, hollow-cheeked,
  wary — holds against it, gathered out of the same nervous strokes yet refusing
  to come apart. Technique becomes temperament.


  The show’s premise, self-portraiture across the centuries, mostly flatters
  this one by contrast. Hang it beside so much careful self-presentation — the
  powdered courtiers, the artists in their good coats, the practiced
  three-quarter turns — and Van Gogh’s refusal to flatter reads as sheer nerve.
  He is not asking to be liked. He is not even, exactly, asking to be
  remembered. He is checking, with a kind of grim curiosity, whether the man in
  the glass is still there, still holding, still worth the paint. He was, and
  this is the portrait that knows it, and Brooklyn has given it just enough room
  to do its quiet, unsettling work.
